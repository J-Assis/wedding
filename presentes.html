<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Presentes</title>

<style>

body{
font-family: Georgia, serif;
text-align:center;
background:#f5f5f5;
}

h1{
margin-top:80px;
color:#6b7fa3;
}

.presentes{
display:flex;
justify-content:center;
gap:30px;
margin-top:60px;
flex-wrap:wrap;
}

.presente{
background:white;
padding:30px;
width:200px;
border-radius:10px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.presente:hover{
transform:scale(1.05);
}

.pix-box{
display:none;
margin-top:60px;
}

.pix-box img{
width:220px;
margin-bottom:15px;
}

</style>
</head>

<body>

<h1>Lista de Presentes</h1>

<p>Sua presença já é o nosso maior presente.  
Mas se desejar nos abençoar, escolha uma opção:</p>

<div class="presentes">

<div class="presente" onclick="mostrarPix()">
🍽️ Jantar romântico
</div>

<div class="presente" onclick="mostrarPix()">
✈️ Ajuda na Lua de Mel
</div>

<div class="presente" onclick="mostrarPix()">
🏡 Nosso novo lar
</div>

</div>

<div class="pix-box" id="pix">

<h2>Escaneie o QR Code</h2>

<img src="qrcodepix.png">

<p><b>Chave PIX:</b><br>
seupix@email.com
</p>

</div>

<script>

function mostrarPix(){
document.getElementById("pix").style.display = "block";
window.scrollTo({
top:600,
behavior:"smooth"
});
}

</script>

</body>
</html>
