<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Confirmação de Presença</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&family=Lora&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
:root {
    --dusty-blue: #7E96B6;
    --sage-green: #8ca67a;
    --gray-light: #e0e0e0;
    --champagne: #D9C5B2;
    --white: #ffffff;
}

body {
    background-color: #f4f7f9; /* Fundo suave para destacar o card */
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh; /* Garante centralização vertical na tela */
    font-family: 'Lora', serif;
}

.confirm-section {
    width: 90%;
    max-width: 500px; /* Tamanho único e elegante */
    padding: 50px 40px;
    background: var(--white);
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    border-radius: 24px; /* Bordas bem arredondadas */
    text-align: center;
    box-sizing: border-box;
}

.confirm-section h2 {
    font-family: 'Libre Baskerville', serif;
    font-size: 2.5rem;
    color: var(--dusty-blue);
    margin-bottom: 10px;
}

.confirm-section p {
    color: #666;
    font-size: 1rem;
    margin-bottom: 30px;
}

.form-group {
    margin-bottom: 20px;
    text-align: left;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 14px;
    border: 1.5px solid var(--gray-light);
    border-radius: 12px; /* Bordas arredondadas nos campos */
    font-family: 'Lora', serif;
    font-size: 1rem;
    transition: all 0.3s ease;
    box-sizing: border-box;
    outline: none;
}

.form-group input:focus,
.form-group select:focus {
    border-color: var(--dusty-blue);
    box-shadow: 0 0 8px rgba(126, 150, 182, 0.2);
}

button {
    width: 100%; /* Botão largo para facilitar o clique no celular */
    margin-top: 10px;
    padding: 16px;
    border: none;
    background: var(--dusty-blue); /* Mudei para o azul para dar destaque */
    color: white;
    border-radius: 12px; /* Bordas arredondadas no botão */
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: bold;
    transition: transform 0.2s, background 0.3s;
}

button:hover {
    background: #6a82a3;
    transform: translateY(-2px);
}

.small-warning {
    font-size: 0.8rem;
    color: #999;
    margin-top: 25px;
    font-style: italic;
    line-height: 1.4;
}

#msg {
    margin-top: 20px;
    font-weight: bold;
    color: var(--sage-green);
}
</style>

</head>

<body>

<section class="confirm-section">

<h2>Confirmação</h2>

<p>Ficaremos muito felizes com sua presença.</p>

<form id="rsvpForm">

<div class="form-group">
<label>Nome completo</label>
<input type="text" name="nome" required>
</div>

<div class="form-group">
<label>Telefone</label>
<input type="tel" name="telefone" required>
</div>

<div class="form-group">
<label>Você irá ao casamento?</label>
<select name="presenca" required>
<option value="">Selecione</option>
<option value="Sim">Sim, estarei presente</option>
<option value="Nao">Infelizmente não poderei ir</option>
</select>
</div>

<button type="submit">Confirmar presença</button>

<p class="small-warning">
Para manter a organização do evento, pedimos gentilmente que apenas os convidados confirmem presença.
</p>

</form>

<p id="msg"></p>

</section>

<script>

document.getElementById("rsvpForm").addEventListener("submit", function(e){

  e.preventDefault()

  let data = new FormData(this)

  fetch("https://script.google.com/macros/s/AKfycbwKFUnzU8HsSKO49ymKi7eM9FdypB-n6_SjrOm2eZqSoIbolor4EtSZveQbVAxsfENfBw/exec",{
    method:"POST",
    body:data
  })
  .then(res=>res.text())
  .then(res=>{

    document.getElementById("msg").innerText="Respondido! Redirecionando..."

    document.getElementById("rsvpForm").reset()

    setTimeout(function(){
      window.location.href="index.html"
    },1000)

  })
  .catch(()=>{
    document.getElementById("msg").innerText="Erro ao enviar. Tente novamente."
  })

})

</script>

</body>
</html>
